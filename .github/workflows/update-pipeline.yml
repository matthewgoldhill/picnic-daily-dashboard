name: Update Pipeline Data

on:
  schedule:
    - cron: '0 9 * * 1-5'  # 9am UTC weekdays
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Fetch and process Monday.com pipeline
        env:
          MONDAY_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
        run: |
          cat > fetch_pipeline.js << 'SCRIPT'
          const https = require('https');

          // Month-to-column-ID mapping for Net Formula and Est GP
          const MONTH_COLUMNS = {
            1:  { net: 'formula52',  gp: 'formula_mksggav0' },
            2:  { net: 'formula36',  gp: 'formula_mksgwwcr' },
            3:  { net: 'formula077', gp: 'formula_mksgcz2t' },
            4:  { net: 'formula6',   gp: 'formula_mksgen1v' },
            5:  { net: 'formula83',  gp: 'formula_mksgs24d' },
            6:  { net: 'formula96',  gp: 'formula_mksgyb4y' },
            7:  { net: 'formula89',  gp: 'formula_mksg2sqq' },
            8:  { net: 'formula81',  gp: 'formula_mksg7nxw' },
            9:  { net: 'formula95',  gp: 'formula_mksgm5vc' },
            10: { net: 'formula76',  gp: 'formula_mksgz4q4' },
            11: { net: 'formula30',  gp: 'formula_mksg50t7' },
            12: { net: 'formula78',  gp: 'formula_mksgr3ew' },
          };

          const month = new Date().getMonth() + 1;
          const { net: netCol, gp: gpCol } = MONTH_COLUMNS[month];
          console.error(`Month: ${month}, Net col: ${netCol}, GP col: ${gpCol}`);

          function mondayQuery(query) {
            return new Promise((resolve, reject) => {
              const body = JSON.stringify({ query });
              const req = https.request({
                hostname: 'api.monday.com',
                path: '/v2',
                method: 'POST',
                headers: {
                  'Authorization': process.env.MONDAY_TOKEN,
                  'Content-Type': 'application/json',
                  'Content-Length': Buffer.byteLength(body),
                },
              }, res => {
                let data = '';
                res.on('data', c => data += c);
                res.on('end', () => {
                  try { resolve(JSON.parse(data)); }
                  catch (e) { reject(new Error('Bad JSON: ' + data.slice(0, 200))); }
                });
              });
              req.on('error', reject);
              req.write(body);
              req.end();
            });
          }

          async function fetchAllItems() {
            const colIds = `["deal_stage", "${netCol}", "${gpCol}"]`;
            const allItems = [];
            let cursor = null;

            // First page
            const firstQuery = `{ boards(ids: 1306145892) { items_page(limit: 500) { cursor items { name column_values(ids: ${colIds}) { id text } } } } }`;
            const first = await mondayQuery(firstQuery);
            const firstPage = first.data.boards[0].items_page;
            allItems.push(...firstPage.items);
            cursor = firstPage.cursor;
            console.error(`Page 1: ${firstPage.items.length} items`);

            // Subsequent pages
            while (cursor) {
              const nextQuery = `{ next_items_page(limit: 500, cursor: "${cursor}") { cursor items { name column_values(ids: ${colIds}) { id text } } } }`;
              const next = await mondayQuery(nextQuery);
              const page = next.data.next_items_page;
              allItems.push(...page.items);
              cursor = page.cursor;
              console.error(`Next page: ${page.items.length} items, total: ${allItems.length}`);
            }

            return allItems;
          }

          async function main() {
            const items = await fetchAllItems();
            console.error(`Total items fetched: ${items.length}`);

            const stages = {};
            items.forEach(item => {
              const dealStage = (item.column_values.find(c => c.id === 'deal_stage') || {}).text || '';
              if (!dealStage.includes('(90%)') && !dealStage.includes('(100%)')) return;

              const netVal = (item.column_values.find(c => c.id === netCol) || {}).text || '0';
              const gpVal = (item.column_values.find(c => c.id === gpCol) || {}).text || '0';

              if (!stages[dealStage]) stages[dealStage] = { stage: dealStage, net: 0, gp: 0 };
              stages[dealStage].net += parseFloat(netVal.replace(/[^0-9.\-]/g, '')) || 0;
              stages[dealStage].gp += parseFloat(gpVal.replace(/[^0-9.\-]/g, '')) || 0;
            });

            const result = {
              lastUpdated: new Date().toISOString().split('T')[0],
              stages: Object.values(stages),
            };

            console.error('Result:', JSON.stringify(result, null, 2));
            // stdout is captured as the output
            console.log(JSON.stringify(result));
          }

          main().catch(e => { console.error(e); process.exit(1); });
          SCRIPT

          node fetch_pipeline.js > pipeline_data.json
          echo "Pipeline data:"
          cat pipeline_data.json

      - name: Update index.html
        run: |
          node -e "
          const fs = require('fs');
          const pipeline = JSON.parse(fs.readFileSync('pipeline_data.json','utf8'));
          let html = fs.readFileSync('index.html','utf8');
          const stagesStr = pipeline.stages.map(s =>
            '        { stage: \"' + s.stage + '\", net: ' + s.net.toFixed(2) + ', gp: ' + s.gp.toFixed(2) + ' },'
          ).join('\n');
          const replacement = 'const PIPELINE_DATA = {\n      lastUpdated: \"' + pipeline.lastUpdated + '\",\n      stages: [\n' + stagesStr + '\n      ],\n    };';
          html = html.replace(/const PIPELINE_DATA = \{[\s\S]*?\};/, replacement);
          fs.writeFileSync('index.html', html);
          "

      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html
          git diff --cached --quiet || (git commit -m "chore: update pipeline data $(date +%Y-%m-%d)" && git push)
