name: Update Pipeline Data

on:
  schedule:
    - cron: '0 9 * * 1-5'  # 9am UTC weekdays
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Fetch and process Monday.com pipeline
        env:
          MONDAY_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
        run: |
          cat > fetch_pipeline.js << 'SCRIPT'
          const https = require('https');

          // Monday.com GraphQL API does NOT return formula column values.
          // We fetch the source columns and compute Net + GP ourselves.

          // Month-to-gross-column-ID mapping
          const MONTH_GROSS = {
            1:  'numbers3',
            2:  'numeric',
            3:  'numeric7',
            4:  'numeric8',
            5:  'numeric1',
            6:  'dup__of_may__gross_',
            7:  'numeric6',
            8:  'numeric85',
            9:  'numeric87',
            10: 'numeric67',
            11: 'numeric2',
            12: 'numeric5',
          };

          // Shared columns needed for Net/GP formulas
          const SHARED_COLS = [
            'deal_stage',        // status: (90%), (100%), etc.
            'delivery_method',   // status: Programmatic, Data Activation, etc.
            'custom_net',        // status: True/False
            'numbers4',          // number: NET Discount %
            'color_mksg773',     // status: Trading Deal True/False
            'numeric_mksge54p',  // number: Trading Deal %
            'dropdown3',         // dropdown: Year (2023/2024/2025/2026)
          ];

          const now = new Date();
          const month = now.getMonth() + 1;
          const year = now.getFullYear().toString();
          const grossCol = MONTH_GROSS[month];
          const allCols = [...SHARED_COLS, grossCol];
          console.error(`Month: ${month}, Year: ${year}, Gross col: ${grossCol}`);

          function mondayQuery(query) {
            return new Promise((resolve, reject) => {
              const body = JSON.stringify({ query });
              const req = https.request({
                hostname: 'api.monday.com',
                path: '/v2',
                method: 'POST',
                headers: {
                  'Authorization': process.env.MONDAY_TOKEN,
                  'Content-Type': 'application/json',
                  'Content-Length': Buffer.byteLength(body),
                },
              }, res => {
                let data = '';
                res.on('data', c => data += c);
                res.on('end', () => {
                  try { resolve(JSON.parse(data)); }
                  catch (e) { reject(new Error('Bad JSON: ' + data.slice(0, 200))); }
                });
              });
              req.on('error', reject);
              req.write(body);
              req.end();
            });
          }

          async function fetchAllItems() {
            const colIds = JSON.stringify(allCols);
            const allItems = [];
            let cursor = null;

            const firstQuery = `{ boards(ids: 1306145892) { items_page(limit: 500) { cursor items { name column_values(ids: ${colIds}) { id text value } } } } }`;
            const first = await mondayQuery(firstQuery);
            const firstPage = first.data.boards[0].items_page;
            allItems.push(...firstPage.items);
            cursor = firstPage.cursor;
            console.error(`Page 1: ${firstPage.items.length} items`);

            while (cursor) {
              const nextQuery = `{ next_items_page(limit: 500, cursor: "${cursor}") { cursor items { name column_values(ids: ${colIds}) { id text value } } } }`;
              const next = await mondayQuery(nextQuery);
              const page = next.data.next_items_page;
              allItems.push(...page.items);
              cursor = page.cursor;
              console.error(`Next page: ${page.items.length} items, total: ${allItems.length}`);
            }

            return allItems;
          }

          // Get text value from a column
          function getText(item, colId) {
            const col = item.column_values.find(c => c.id === colId);
            return (col && col.text) || '';
          }

          // Get numeric value from a column
          function getNum(item, colId) {
            const col = item.column_values.find(c => c.id === colId);
            if (!col) return 0;
            if (col.text && col.text !== '') {
              return parseFloat(col.text.replace(/[^0-9.\-]/g, '')) || 0;
            }
            if (col.value) {
              try {
                const parsed = JSON.parse(col.value);
                if (typeof parsed === 'number') return parsed;
                if (parsed && typeof parsed.value === 'number') return parsed.value;
                if (parsed && typeof parsed.value === 'string') return parseFloat(parsed.value) || 0;
              } catch (e) {
                return parseFloat(col.value.replace(/[^0-9.\-]/g, '')) || 0;
              }
            }
            return 0;
          }

          // Compute Net Formula:
          //   customNetFormula = IF(delivery_method == "Data Activation", "True", custom_net)
          //   net = gross * IF(customNetFormula == "True", 1 - netDiscount, 0.85)
          function computeNet(item) {
            const gross = getNum(item, grossCol);
            if (gross === 0) return 0;

            const deliveryMethod = getText(item, 'delivery_method');
            const customNet = getText(item, 'custom_net');
            const netDiscount = getNum(item, 'numbers4');

            // Custom Net Formula intermediate
            const customNetFormula = (deliveryMethod === 'Data Activation') ? 'True' : customNet;
            const discountFactor = (customNetFormula === 'True') ? (1 - netDiscount / 100) : 0.85;

            return gross * discountFactor;
          }

          // Compute GP Formula:
          //   IF(delivery_method == "Data Activation", net, net * IF(tradingDeal == "True", 1 - tradingPct, 1) * 0.5)
          function computeGP(item, net) {
            const deliveryMethod = getText(item, 'delivery_method');
            if (deliveryMethod === 'Data Activation') return net;

            const tradingDeal = getText(item, 'color_mksg773');
            const tradingPct = getNum(item, 'numeric_mksge54p');

            const tradingFactor = (tradingDeal === 'True') ? (1 - tradingPct / 100) : 1;
            return net * tradingFactor * 0.5;
          }

          async function main() {
            const items = await fetchAllItems();
            console.error(`Total items fetched: ${items.length}`);

            let logged = false;
            const stages = {};

            items.forEach(item => {
              const dealStage = getText(item, 'deal_stage');
              if (!dealStage.includes('(90%)') && !dealStage.includes('(100%)')) return;

              // Filter by current year (dropdown3 = Year column, can be multi-select e.g. "2025, 2026")
              const itemYear = getText(item, 'dropdown3');
              if (!itemYear.includes(year)) return;

              const net = computeNet(item);
              const gp = computeGP(item, net);

              if (!logged) {
                const gross = getNum(item, grossCol);
                console.error('Sample matched item:', item.name);
                console.error('  deal_stage:', dealStage);
                console.error('  gross:', gross, '-> net:', net, '-> gp:', gp);
                console.error('  delivery_method:', getText(item, 'delivery_method'));
                console.error('  custom_net:', getText(item, 'custom_net'));
                console.error('  net_discount:', getNum(item, 'numbers4'));
                logged = true;
              }

              if (!stages[dealStage]) stages[dealStage] = { stage: dealStage, net: 0, gp: 0 };
              stages[dealStage].net += net;
              stages[dealStage].gp += gp;
            });

            const result = {
              lastUpdated: new Date().toISOString().split('T')[0],
              stages: Object.values(stages),
            };

            console.error('Result:', JSON.stringify(result, null, 2));
            console.log(JSON.stringify(result));
          }

          main().catch(e => { console.error(e); process.exit(1); });
          SCRIPT

          node fetch_pipeline.js > pipeline_data.json
          echo "Pipeline data:"
          cat pipeline_data.json

      - name: Fetch FX rate
        run: |
          curl -sf https://api.frankfurter.app/latest?from=USD\&to=GBP -o fx_rate.json
          echo "FX data:"
          cat fx_rate.json

      - name: Update index.html
        run: |
          node -e "
          const fs = require('fs');
          const pipeline = JSON.parse(fs.readFileSync('pipeline_data.json','utf8'));
          const fx = JSON.parse(fs.readFileSync('fx_rate.json','utf8'));
          let html = fs.readFileSync('index.html','utf8');

          // Update pipeline data
          const stagesStr = pipeline.stages.map(s =>
            '        { stage: \"' + s.stage + '\", net: ' + s.net.toFixed(2) + ', gp: ' + s.gp.toFixed(2) + ' },'
          ).join('\n');
          const replacement = 'const PIPELINE_DATA = {\n      lastUpdated: \"' + pipeline.lastUpdated + '\",\n      stages: [\n' + stagesStr + '\n      ],\n    };';
          html = html.replace(/const PIPELINE_DATA = \{[\s\S]*?\};/, replacement);

          // Update FX rate
          const rate = fx.rates.GBP.toFixed(4);
          const fxDate = fx.date;
          html = html.replace(/const FX_RATE = .*?;.*/, 'const FX_RATE = ' + rate + '; // USD/GBP spot - updated ' + fxDate);
          console.log('FX rate: ' + rate + ' (as of ' + fxDate + ')');

          fs.writeFileSync('index.html', html);
          "

      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html
          git diff --cached --quiet || (git commit -m "chore: update pipeline & FX data $(date +%Y-%m-%d)" && git push)
